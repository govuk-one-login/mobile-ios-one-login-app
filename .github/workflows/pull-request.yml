name: iOS Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - develop
      - release/*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_unit_tests:
    name: Run Unit Tests for PR
    uses: ./.github/workflows/unit-test.yml
    with:
      pr: true
    secrets: inherit

  test_snapshot:
    name: Run Snapshot Tests
    uses: ./.github/workflows/snapshot-test.yml
    secrets: inherit